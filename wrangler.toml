name = "nodex"
main = "src/index.ts"
compatibility_date = "2024-03-20"

# Scheduled triggers for updating and pinging configs
[triggers]
crons = ["0 * * * *"] # Every 1 hour

# Bind D1 Database
[[d1_databases]]
binding = "DB"
database_name = "sub-manager-db"
database_id = "00000000-0000-0000-0000-000000000000" # Replace with real ID
