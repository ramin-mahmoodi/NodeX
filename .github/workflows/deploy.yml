name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        
      - name: Automagically Setup D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          sudo apt-get install jq -y
          
          echo "Checking for existing D1 database..."
          # Hide wrangler.toml temporarily so wrangler d1 info doesn't read the dummy ID
          mv wrangler.toml wrangler.toml.bak
          
          DB_ID=$(npx wrangler d1 info sub-manager-db --json 2>/dev/null | jq -r '.uuid' || echo "")
          
          if [ -z "$DB_ID" ] || [ "$DB_ID" == "null" ]; then
            echo "Database not found. Creating a new one..."
            npx wrangler d1 create sub-manager-db > d1_out.txt
            DB_ID=$(sed -n 's/.*database_id = "\(.*\)".*/\1/p' d1_out.txt)
          fi
          
          # Restore wrangler.toml
          mv wrangler.toml.bak wrangler.toml
          
          echo "Database ID: $DB_ID"
          
          if [ -n "$DB_ID" ]; then
            # Inject the real DB ID into wrangler.toml
            sed -i "s/00000000-0000-0000-0000-000000000000/$DB_ID/g" wrangler.toml
          else
            echo "Failed to find or create Database ID."
            exit 1
          fi
          
          # Execute the schema (Ignore if it fails because tables might already exist)
          echo "Applying database schema..."
          npx wrangler d1 execute sub-manager-db --remote --file=./schema.sql || true
          
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
